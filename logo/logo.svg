<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#454370"/>
      <stop offset="100%" stop-color="#1a1830"/>
    </radialGradient>

    <!-- Eye glow gradient -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a0f0ff"/>
      <stop offset="60%" stop-color="#5bc8f5"/>
      <stop offset="100%" stop-color="#2266cc" stop-opacity="0"/>
    </radialGradient>

    <!-- Scan beam gradient -->
    <linearGradient id="scanBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5bc8f5" stop-opacity="0"/>
      <stop offset="60%" stop-color="#5bc8f5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a0f0ff" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Pulse ring filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Eye glow filter -->
    <filter id="eyeBloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circleClip">
      <circle cx="64" cy="64" r="60"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bgGrad)" stroke="#454370" stroke-width="1.5"/>

  <!-- Outer pulse rings -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="#5bc8f5" stroke-width="0.8" opacity="0">
    <animate attributeName="r" values="40;58;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="64" cy="64" r="46" fill="none" stroke="#7cb87c" stroke-width="0.6" opacity="0">
    <animate attributeName="r" values="30;50;30" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Radar sweep (rotating group) -->
  <g clip-path="url(#circleClip)">
    <g transform-origin="64 64">
      <animateTransform attributeName="transform" type="rotate" from="0 64 64" to="360 64 64" dur="4s" repeatCount="indefinite"/>
      <!-- Sweep wedge -->
      <path d="M64,64 L64,10 A54,54 0 0,1 110,82 Z" fill="url(#scanBeam)" opacity="0.35"/>
      <!-- Sweep leading line -->
      <line x1="64" y1="64" x2="64" y2="10" stroke="#a0f0ff" stroke-width="1.2" opacity="0.9"/>
    </g>

    <!-- Radar grid circles -->
    <circle cx="64" cy="64" r="18" fill="none" stroke="#5bc8f5" stroke-width="0.5" opacity="0.3"/>
    <circle cx="64" cy="64" r="36" fill="none" stroke="#5bc8f5" stroke-width="0.5" opacity="0.2"/>
    <circle cx="64" cy="64" r="54" fill="none" stroke="#5bc8f5" stroke-width="0.5" opacity="0.15"/>
    <!-- Crosshair lines -->
    <line x1="64" y1="10" x2="64" y2="118" stroke="#5bc8f5" stroke-width="0.4" opacity="0.15"/>
    <line x1="10" y1="64" x2="118" y2="64" stroke="#5bc8f5" stroke-width="0.4" opacity="0.15"/>
  </g>

  <!-- Wolf silhouette body -->
  <g filter="url(#glow)">
    <!-- Ears -->
    <polygon points="40,52 32,28 52,42" fill="#2a2845" stroke="#5bc8f5" stroke-width="0.8"/>
    <polygon points="88,52 96,28 76,42" fill="#2a2845" stroke="#5bc8f5" stroke-width="0.8"/>
    <!-- Inner ears -->
    <polygon points="41,50 35,33 50,43" fill="#373552"/>
    <polygon points="87,50 93,33 78,43" fill="#373552"/>

    <!-- Head shape -->
    <ellipse cx="64" cy="68" rx="28" ry="24" fill="#2a2845" stroke="#5bc8f5" stroke-width="0.8"/>

    <!-- Snout -->
    <ellipse cx="64" cy="78" rx="13" ry="9" fill="#232240"/>
    <!-- Nose -->
    <ellipse cx="64" cy="73" rx="5" ry="3.5" fill="#5bc8f5" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Muzzle lines -->
    <line x1="64" y1="76" x2="55" y2="82" stroke="#454370" stroke-width="1"/>
    <line x1="64" y1="76" x2="73" y2="82" stroke="#454370" stroke-width="1"/>

    <!-- LEFT EYE glow -->
    <circle cx="52" cy="62" r="7" fill="#1a1830" filter="url(#eyeBloom)"/>
    <circle cx="52" cy="62" r="5.5" fill="url(#eyeGlow)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;1;0.9" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="62" r="3" fill="#a0f0ff">
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50.5" cy="60.5" r="1" fill="white" opacity="0.8"/>

    <!-- RIGHT EYE glow -->
    <circle cx="76" cy="62" r="7" fill="#1a1830" filter="url(#eyeBloom)"/>
    <circle cx="76" cy="62" r="5.5" fill="url(#eyeGlow)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;1;0.9" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="76" cy="62" r="3" fill="#a0f0ff">
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="74.5" cy="60.5" r="1" fill="white" opacity="0.8"/>
  </g>

  <!-- Data flow dots moving outward (top) -->
  <circle r="2" fill="#7cb87c" opacity="0">
    <animateMotion path="M64,64 L64,12" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Data flow dots (right) -->
  <circle r="2" fill="#5bc8f5" opacity="0">
    <animateMotion path="M64,64 L116,64" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Data flow dots (bottom-left) -->
  <circle r="2" fill="#a0f0ff" opacity="0">
    <animateMotion path="M64,64 L20,100" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner circuit nodes -->
  <g fill="#5bc8f5" opacity="0.6">
    <circle cx="20" cy="20" r="2">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="108" cy="20" r="2">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="108" r="2">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="108" cy="108" r="2">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner circuit lines -->
  <g stroke="#5bc8f5" stroke-width="0.8" opacity="0.25" fill="none">
    <polyline points="20,20 20,30 30,30"/>
    <polyline points="108,20 108,30 98,30"/>
    <polyline points="20,108 20,98 30,98"/>
    <polyline points="108,108 108,98 98,98"/>
  </g>

  <!-- Outer border glow -->
  <circle cx="64" cy="64" r="62" fill="none" stroke="#5bc8f5" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
