<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #2C2C2C;
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: #373552;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 14px;
    }
    .header-logo {
      width: 28px;
      height: 28px;
      border-radius: 4px;
    }
    .content {
      padding: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      color: #b0b0b0;
    }
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 12px;
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 13px;
    }
    input:focus {
      outline: none;
      border-color: #5a5a7a;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #373552;
      color: #e0e0e0;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover {
      background: #454370;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
    }
    .status.success { color: #7cb87c; }
    .status.error { color: #c87070; }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo/logo.svg" alt="Wolf Scanner 2026" class="header-logo">
    <span>Wolf Scanner 2026</span>
  </div>
  <div class="content">
    <label for="apiKey">API Key (Tracking ID)</label>
    <input type="password" id="apiKey" placeholder="Enter your API key">
    <label for="userName">User name (optional)</label>
    <input type="text" id="userName" placeholder="e.g. CyberWolf">
    <button id="save">Save</button>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
