<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#2C2C2C"/>
  <rect x="60" y="50" width="1160" height="90" rx="12" fill="#373552"/>
  <text x="90" y="107" fill="#d7e6e1" font-size="38" font-family="Arial" font-weight="700">Impact and Future Enhancements</text>

  <rect x="90" y="180" width="530" height="470" rx="12" fill="#1f1f2e" stroke="#5bcfbb" stroke-width="2"/>
  <text x="120" y="235" fill="#5bcfbb" font-size="28" font-family="Arial" font-weight="700">Current Impact</text>
  <text x="120" y="285" fill="#d7e6e1" font-size="22" font-family="Arial">- Faster incident debugging</text>
  <text x="120" y="325" fill="#d7e6e1" font-size="22" font-family="Arial">- Better visibility of user behavior</text>
  <text x="120" y="365" fill="#d7e6e1" font-size="22" font-family="Arial">- Structured audit-ready telemetry</text>
  <text x="120" y="405" fill="#d7e6e1" font-size="22" font-family="Arial">- Reusable for multiple web apps</text>

  <rect x="660" y="180" width="530" height="470" rx="12" fill="#1f1f2e" stroke="#f5b944" stroke-width="2"/>
  <text x="690" y="235" fill="#f5b944" font-size="28" font-family="Arial" font-weight="700">Future Roadmap</text>
  <text x="690" y="285" fill="#d7e6e1" font-size="22" font-family="Arial">- AI-based anomaly scoring</text>
  <text x="690" y="325" fill="#d7e6e1" font-size="22" font-family="Arial">- Risk score per session and user</text>
  <text x="690" y="365" fill="#d7e6e1" font-size="22" font-family="Arial">- SIEM/SOAR direct integrations</text>
  <text x="690" y="405" fill="#d7e6e1" font-size="22" font-family="Arial">- Real-time threat response actions</text>
</svg>
