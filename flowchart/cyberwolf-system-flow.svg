<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">Cyber Wolf Detailed System Flowchart</title>
  <desc id="desc">Detailed flowchart showing user events, sensor collection, preprocessing, API core, and security intelligence outputs.</desc>

  <defs>
    <style>
      .bg { fill: #2C2C2C; }
      .title { fill: #d7e6e1; font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #90a1b9; font-family: Arial, Helvetica, sans-serif; font-size: 16px; }
      .lane { fill: #373552; stroke: #373552; stroke-width: 2; rx: 14; }
      .lane-title { fill: #25eab5; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; }
      .node { fill: #2c2c2c; stroke: #575675; stroke-width: 2; rx: 10; }
      .node-collect { stroke: #25eab5; }
      .node-process { stroke: #5bcfbb; }
      .node-api { stroke: #f5b944; }
      .node-intel { stroke: #90a1b9; }
      .node-text { fill: #d7e6e1; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .small-text { fill: #90a1b9; font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
      .arrow { stroke: #d7e6e1; stroke-width: 2; fill: none; marker-end: url(#arrowHead); }
      .group-arrow { stroke: #25eab5; stroke-width: 2.5; fill: none; marker-end: url(#arrowHeadGreen); }
    </style>

    <marker id="arrowHead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#d7e6e1" />
    </marker>
    <marker id="arrowHeadGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#25eab5" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1080"/>

  <text class="title" x="70" y="70">Cyber Wolf - Detailed Sensor Intelligence Workflow</text>
  <text class="subtitle" x="70" y="100">Hackindia 2026 MEC | Team Cyber Wolf | Theme aligned with website dark cyber UI</text>

  <!-- Lane containers -->
  <rect class="lane" x="60" y="140" width="1480" height="150"/>
  <rect class="lane" x="60" y="310" width="1480" height="170"/>
  <rect class="lane" x="60" y="500" width="1480" height="180"/>
  <rect class="lane" x="60" y="700" width="1480" height="280"/>

  <text class="lane-title" x="85" y="175">1) User Event Sources</text>
  <text class="lane-title" x="85" y="345">2) Sensor Collection Layer</text>
  <text class="lane-title" x="85" y="535">3) Pre Processing + Sensor API Core</text>
  <text class="lane-title" x="85" y="735">4) Observation, Detection, and Reporting</text>

  <!-- Row 1 nodes -->
  <rect class="node" x="120" y="195" width="280" height="68"/>
  <text class="node-text" x="145" y="225">Page View</text>
  <text class="small-text" x="145" y="245">navigation and content visits</text>

  <rect class="node" x="440" y="195" width="280" height="68"/>
  <text class="node-text" x="465" y="225">Field Edit</text>
  <text class="small-text" x="465" y="245">form changes and profile updates</text>

  <rect class="node" x="760" y="195" width="280" height="68"/>
  <text class="node-text" x="785" y="225">Search Event</text>
  <text class="small-text" x="785" y="245">query, filters, and results</text>

  <rect class="node" x="1080" y="195" width="380" height="68"/>
  <text class="node-text" x="1105" y="225">Special Access Event</text>
  <text class="small-text" x="1105" y="245">localhost, IPv6, and edge cases</text>

  <!-- Row 2 nodes -->
  <rect class="node node-collect" x="170" y="365" width="300" height="75"/>
  <text class="node-text" x="195" y="395">Capture Identity Context</text>
  <text class="small-text" x="195" y="415">user, email, profile metadata</text>

  <rect class="node node-collect" x="520" y="365" width="300" height="75"/>
  <text class="node-text" x="545" y="395">Capture Technical Context</text>
  <text class="small-text" x="545" y="415">IP, URL, user agent, method</text>

  <rect class="node node-collect" x="870" y="365" width="300" height="75"/>
  <text class="node-text" x="895" y="395">Attach Payload + History</text>
  <text class="small-text" x="895" y="415">event type and optional details</text>

  <rect class="node node-collect" x="1220" y="365" width="260" height="75"/>
  <text class="node-text" x="1245" y="395">Add UTC Timestamp</text>
  <text class="small-text" x="1245" y="415">audit and timeline readiness</text>

  <!-- Row 3 nodes -->
  <rect class="node node-process" x="130" y="555" width="270" height="78"/>
  <text class="node-text" x="155" y="585">Remove Empty Values</text>
  <text class="small-text" x="155" y="605">clean null and blank fields</text>

  <rect class="node node-process" x="430" y="555" width="300" height="78"/>
  <text class="node-text" x="455" y="585">Serialize Complex Data</text>
  <text class="small-text" x="455" y="605">convert lists and objects to JSON</text>

  <rect class="node node-api" x="760" y="555" width="260" height="78"/>
  <text class="node-text" x="785" y="585">Validate API Payload</text>
  <text class="small-text" x="785" y="605">schema and event classification</text>

  <rect class="node node-api" x="1050" y="555" width="210" height="78"/>
  <text class="node-text" x="1075" y="585">Store Event</text>
  <text class="small-text" x="1075" y="605">analysis-ready repository</text>

  <rect class="node node-api" x="1290" y="555" width="220" height="78"/>
  <text class="node-text" x="1315" y="585">Return Response</text>
  <text class="small-text" x="1315" y="605">status code and message</text>

  <!-- Row 4 nodes -->
  <rect class="node node-intel" x="140" y="760" width="300" height="86"/>
  <text class="node-text" x="165" y="792">Request/Response Logging</text>
  <text class="small-text" x="165" y="812">traceability and replay support</text>

  <rect class="node node-intel" x="470" y="760" width="300" height="86"/>
  <text class="node-text" x="495" y="792">Behavior Timeline Build</text>
  <text class="small-text" x="495" y="812">session level visibility</text>

  <rect class="node node-intel" x="800" y="760" width="320" height="86"/>
  <text class="node-text" x="825" y="792">Anomaly and Risk Detection</text>
  <text class="small-text" x="825" y="812">suspicious pattern identification</text>

  <rect class="node node-intel" x="1150" y="760" width="340" height="86"/>
  <text class="node-text" x="1175" y="792">Dashboards, Alerts, Reports</text>
  <text class="small-text" x="1175" y="812">actionable security intelligence</text>

  <rect class="node" x="400" y="885" width="820" height="65"/>
  <text class="node-text" x="430" y="922">Outcome: modern, unified, security-aware telemetry pipeline for web applications</text>

  <!-- Connectors -->
  <path class="arrow" d="M260 263 L260 365"/>
  <path class="arrow" d="M580 263 L320 365"/>
  <path class="arrow" d="M900 263 L670 365"/>
  <path class="arrow" d="M1270 263 L1020 365"/>

  <path class="arrow" d="M470 402 L520 402"/>
  <path class="arrow" d="M820 402 L870 402"/>
  <path class="arrow" d="M1170 402 L1220 402"/>

  <path class="arrow" d="M1350 440 L1350 555"/>
  <path class="arrow" d="M400 594 L430 594"/>
  <path class="arrow" d="M730 594 L760 594"/>
  <path class="arrow" d="M1020 594 L1050 594"/>
  <path class="arrow" d="M1260 594 L1290 594"/>

  <path class="group-arrow" d="M1400 633 L1400 760"/>
  <path class="arrow" d="M440 803 L470 803"/>
  <path class="arrow" d="M770 803 L800 803"/>
  <path class="arrow" d="M1120 803 L1150 803"/>
  <path class="group-arrow" d="M1320 846 L1160 917"/>
</svg>
